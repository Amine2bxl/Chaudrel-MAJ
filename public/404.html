<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Page introuvable — Chaudrel Rénovation</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #F7F5F2;
        color: #1A1A1A;
        font-family: Inter, system-ui, sans-serif;
        text-align: center;
        padding: 24px;
      }
      .card { max-width: 480px; }
      .code {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: 96px;
        font-weight: 300;
        line-height: 1;
        color: #8C764E;
        margin-bottom: 16px;
      }
      h1 {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: 32px;
        font-weight: 300;
        margin-bottom: 12px;
      }
      p { font-size: 15px; font-weight: 300; color: rgba(26,26,26,0.65); line-height: 1.7; margin-bottom: 28px; }
      .actions { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
      a.btn {
        display: inline-block;
        padding: 14px 28px;
        border-radius: 999px;
        font-size: 13px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-weight: 600;
        text-decoration: none;
        transition: background 0.2s;
      }
      a.primary { background: #8C764E; color: #fff; }
      a.primary:hover { background: #C4A96B; }
      a.secondary { border: 1px solid rgba(26,26,26,0.2); color: #1A1A1A; }
      a.secondary:hover { background: rgba(26,26,26,0.05); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="code">404</div>
      <h1>Cette page n'existe pas</h1>
      <p>
        La page que vous cherchez a peut-être été déplacée ou n'existe plus.
        Retrouvez nos services, réalisations et demande de devis sur la page d'accueil.
      </p>
      <div class="actions">
        <a class="btn primary" href="/">Retour à l'accueil</a>
        <a class="btn secondary" href="tel:+32477273118">Appeler Chaudrel</a>
      </div>
    </div>
  </body>
</html>
